name: release
on:
  push:
    tags:
    - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - target: x86_64-unknown-linux-gnu
          os: ubuntu-latest
          artifact: radisk-${{ github.ref_name }}-x86_64-linux.tar.gz
        - target: x86_64-unknown-linux-musl
          os: ubuntu-latest
          artifact: radisk-${{ github.ref_name }}-x86_64-linux-musl.tar.gz
        - target: x86_64-apple-darwin
          os: macos-latest
          artifact: radisk-${{ github.ref_name }}-x86_64-macos.tar.gz
        - target: aarch64-apple-darwin
          os: macos-latest
          artifact: radisk-${{ github.ref_name }}-aarch64-macos.tar.gz
        - target: x86_64-pc-windows-msvc
          os: windows-latest
          artifact: radisk-${{ github.ref_name }}-x86_64-windows.zip
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
        target: ${{ matrix.target }}

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        cd target/${{ matrix.target }}/release
        tar czf "${{ matrix.artifact }}" radisk
        mv "${{ matrix.artifact }}" ../../../

    - name: Package (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        cd target/${{ matrix.target }}/release
        7z a -tzip "${{ matrix.artifact }}" radisk.exe
        mv "${{ matrix.artifact }}" ../../../

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/*.tar.gz
          **/*.zip
        draft: true
        generate_release_notes: true
